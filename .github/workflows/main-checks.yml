name: 🚀 Main Branch Checks (Production Gate)

# ─────────────────────────────────────────────────────────────
#  Runs on every push to main AND every PR targeting main.
#  ALL jobs must pass — hard production gate.
#  Stricter than develop: zero warnings, strict TS, prod build.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: main-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ╔══════════════════════════════════════════╗
  # ║  JOB 1 — Docker Build (production        ║
  # ║  stages, not dev)                        ║
  # ╚══════════════════════════════════════════╝
  docker-build:
    name: 🐳 Docker Build — Production Targets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=production
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      # Build production stage of backend Dockerfile
      - name: Build backend — production stage
        run: |
          docker build \
            --target production \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -f backend/backend.Dockerfile \
            -t exam-arena-backend:ci .

      # Build runner (production) stage of frontend Dockerfile
      - name: Build frontend — runner stage
        run: |
          docker build \
            --target runner \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            -f frontend.Dockerfile \
            -t exam-arena-frontend:ci .

  # ╔══════════════════════════════════════════╗
  # ║  JOB 2 — Prisma Checks                   ║
  # ╚══════════════════════════════════════════╝
  prisma-checks:
    name: 🗄️ Prisma Validate · Generate · DB Connect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      - name: Build backend image
        run: docker compose build backend
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start backend container
        run: docker compose up -d backend
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Wait for backend container
        run: |
          for i in $(seq 1 20); do
            if docker compose exec -T backend echo "ready" > /dev/null 2>&1; then
              echo "✅ Backend ready"; exit 0
            fi
            echo "  attempt $i/20 — waiting 3s..." && sleep 3
          done
          docker compose logs backend && exit 1

      - name: Prisma Validate
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma validate

      - name: Prisma Generate (pyclient)
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma generate --generator pyclient

      - name: Prisma DB Push (NeonDB connectivity)
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma db push --accept-data-loss

      # Extra on main — no un-applied migrations allowed
      - name: Prisma Migrate Status (no drift)
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma migrate status

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Teardown
        if: always()
        run: docker compose down

  # ╔══════════════════════════════════════════╗
  # ║  JOB 3 — Backend Lint STRICT             ║
  # ╚══════════════════════════════════════════╝
  backend-lint:
    name: 🐍 Backend Lint — STRICT (Ruff + Black)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff & Black
        run: pip install ruff black

      # --exit-non-zero-on-fix: even auto-fixable issues fail on main
      - name: Ruff — strict lint
        run: ruff check backend/ --exit-non-zero-on-fix

      - name: Black — format check
        run: black --check backend/

  # ╔══════════════════════════════════════════╗
  # ║  JOB 4 — Frontend STRICT                 ║
  # ╚══════════════════════════════════════════╝
  frontend-checks:
    name: ⚡ Frontend Checks — STRICT (ESLint · TSC · Prettier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      # --max-warnings=0: warnings = failures on main
      - name: ESLint — zero warnings allowed
        run: npm run lint -- --max-warnings=0

      # --strict: all strict TS flags enabled
      - name: TypeScript — strict type check
        run: npx tsc --noEmit --strict
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Prettier — format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"

  # ╔══════════════════════════════════════════╗
  # ║  JOB 5 — Next.js Production Build        ║
  # ║  Only runs after ALL other jobs pass      ║
  # ╚══════════════════════════════════════════╝
  build-verify:
    name: 🏗️ Next.js Production Build
    runs-on: ubuntu-latest
    needs: [docker-build, prisma-checks, backend-lint, frontend-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Next.js — production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}