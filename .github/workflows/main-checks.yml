name: 🚀 Main Branch Checks (Production Gate)

# ─────────────────────────────────────────────────────────────
#  Runs on every push to main AND every PR targeting main.
#  ALL jobs must pass — hard production gate.
#  Mirrors Makefile.full-ci: format checks, strict lint, types.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: main-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-gate:
    name: 🔒 Full CI Pipeline (Docker Native)
    runs-on: ubuntu-latest
    steps:
      # 1. Setup & Environment
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      # 2. Build & Start Stack
      - name: Build and Start Services
        run: docker compose up -d --build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Wait for Backend Health
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl --silent http://localhost:8000/health 2>/dev/null || true)
            if echo "$RESPONSE" | grep -q '"healthy"'; then
              echo "✅ Backend ready"
              exit 0
            fi
            echo "  attempt $i/30 — $RESPONSE"
            sleep 3
          done
          echo "❌ Backend never became ready"
          docker compose logs backend
          exit 1

      # 3. Prisma Schema & DB 
      - name: Prisma Generate
        run: docker compose exec -T backend prisma generate --generator pyclient

      - name: Prisma DB Push
        run: docker compose exec -T -e DATABASE_URL="${{ secrets.DATABASE_URL }}" backend prisma db push --accept-data-loss

     

      # 4. Backend Checks (FastAPI)
      - name: 🐍 Check Formatting (Black)
        run: docker compose exec -T backend black --check app/

      - name: 🐍 Strict Linting (Ruff)
        run: docker compose exec -T backend ruff check app/

      - name: 🐍 Strict Typing (Mypy)
        run: docker compose exec -T backend mypy app/

      # 5. Frontend Checks (Next.js)
      - name: ⚡ Check Formatting (Prettier)
        run: docker compose exec -T frontend npx prettier --check src/

      - name: ⚡ Strict Linting (ESLint)
        run: docker compose exec -T frontend npm run lint -- --max-warnings=0

      - name: ⚡ Strict Typing (TypeScript)
        run: docker compose exec -T frontend npx tsc --noEmit



      # 7. Cleanup & Logs
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== BACKEND LOGS ==="
          docker compose logs backend
          echo "=== FRONTEND LOGS ==="
          docker compose logs frontend

      - name: Teardown
        if: always()
        run: docker compose down