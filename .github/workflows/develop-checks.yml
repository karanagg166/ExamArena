name: 🔍 Develop Branch Checks

# ─────────────────────────────────────────────────────────────
#  Runs on every push to develop AND every PR targeting develop
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: develop-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ╔══════════════════════════════════════════╗
  # ║  JOB 1 — Docker Build                    ║
  # ║  backend.Dockerfile runs prisma generate ║
  # ║  at build time — so this also tests it   ║
  # ╚══════════════════════════════════════════╝
  docker-build:
    name: 🐳 Docker Build (all services)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # docker-compose reads root .env for variable substitution.
      # We create it from GitHub Secrets so compose + env_file both work.
      - name: Create root .env from secrets
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      # backend.Dockerfile passes DATABASE_URL as a build ARG for
      # prisma generate — we use the real NeonDB URL here since
      # generate only needs the schema, not an active connection.
      - name: Build all Docker images (dev targets)
        run: docker compose build --no-cache
        env:
          DATABASE_URL:                    ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_API_URL:             http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  # ╔══════════════════════════════════════════╗
  # ║  JOB 2 — Prisma Checks                   ║
  # ║  validate schema · generate pyclient     ║
  # ║  · db push → real NeonDB connectivity    ║
  # ╚══════════════════════════════════════════╝
  prisma-checks:
    name: 🗄️ Prisma Validate · Generate · DB Connect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<EOF > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      # Build backend image (prisma generate runs during docker build)
      - name: Build backend image
        run: docker compose build backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      # You use NeonDB (cloud Postgres) — no local db service needed!
      # We start ONLY the backend container; it connects to NeonDB directly.
      - name: Start backend container
        run: docker compose up -d backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend container..."
          for i in $(seq 1 20); do
            if docker compose exec -T backend echo "ready" > /dev/null 2>&1; then
              echo "✅ Backend container ready"
              exit 0
            fi
            echo "  attempt $i/20 — waiting 3s..."
            sleep 3
          done
          echo "❌ Backend container never became ready"
          docker compose logs backend
          exit 1

      # ── Step A: Schema syntax valid? ──
      - name: Prisma Validate
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma validate

      # ── Step B: Python client generates? ──
      - name: Prisma Generate (pyclient)
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma generate --generator pyclient

      # ── Step C: Can we actually reach NeonDB and apply schema? ──
      - name: Prisma DB Push (NeonDB connectivity)
        run: |
          docker compose exec -T \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            backend prisma db push --accept-data-loss

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Teardown
        if: always()
        run: docker compose down

  # ╔══════════════════════════════════════════╗
  # ║  JOB 3 — Backend Lint (Ruff + Black)     ║
  # ╚══════════════════════════════════════════╝
  
    name: ⚡ Frontend Checks (ESLint · TSC · Prettier)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript — type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Prettier — format check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json,css,md}"