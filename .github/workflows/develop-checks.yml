name: 🔍 Develop Branch Checks

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: develop-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ╔══════════════════════════════════════════╗
  # ║  JOB 1 — Docker Build                    ║
  # ╚══════════════════════════════════════════╝
  docker-build:
    name: 🐳 Docker Build (all services)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      - name: Build all Docker images (dev targets)
        run: docker compose build --no-cache
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  # ╔══════════════════════════════════════════╗
  # ║  JOB 2 — Prisma Checks                   ║
  # ╚══════════════════════════════════════════╝
  prisma-checks:
    name: 🗄️ Prisma Validate · Generate · DB Connect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create root .env from secrets
        run: |
          cat <<'EOF' > .env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          ENVIRONMENT=ci
          ALLOWED_ORIGINS=http://localhost:3000
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
          EOF

      - name: Build backend image
        run: docker compose build backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Start backend container
        run: docker compose up -d backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            RESPONSE=$(curl --silent http://localhost:8000/health 2>/dev/null || true)
            if echo "$RESPONSE" | grep -q '"healthy"'; then
              echo "✅ Backend ready"
              exit 0
            fi
            echo "  attempt $i/30 — $RESPONSE"
            sleep 3
          done
          echo "❌ Backend never became ready"
          docker compose logs backend
          exit 1

      - name: Prisma Validate
        run: docker compose exec -T -e DATABASE_URL="${{ secrets.DATABASE_URL }}" backend prisma validate

      - name: Prisma Generate (pyclient)
        run: docker compose exec -T -e DATABASE_URL="${{ secrets.DATABASE_URL }}" backend prisma generate --generator pyclient

      - name: Prisma DB Push (NeonDB connectivity)
        run: docker compose exec -T -e DATABASE_URL="${{ secrets.DATABASE_URL }}" backend prisma db push --accept-data-loss

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs backend

      - name: Teardown
        if: always()
        run: docker compose down